<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Customer Reviews - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_style.css') }}" />
    <style>
      .reviews-page .table-container {
        background: rgba(18, 18, 18, 0.95);
        border: 1px solid rgba(255, 179, 0, 0.35);
      }

      .reviews-page table {
        min-width: 900px;
      }

      .reviews-page th {
        background: #2a1018;
        color: #ffb300;
        font-size: 13px;
        padding: 16px 14px;
      }

      .reviews-page td {
        color: #f5f5f5;
        font-size: 15px;
        padding: 16px 14px;
        vertical-align: middle;
      }

      .reviews-page tbody tr {
        transition: background 0.2s;
      }

      .reviews-page tbody tr:nth-child(even) td {
        background: rgba(255, 255, 255, 0.03);
      }

      .reviews-page tbody tr:hover td {
        background: rgba(255, 179, 0, 0.12) !important;
      }

      .review-date {
        color: #e8e8e8;
        font-weight: 500;
        white-space: nowrap;
      }

      .review-customer {
        color: #ffffff;
        font-weight: 700;
        text-transform: capitalize;
      }

      .review-item-cell {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .review-item-img {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        object-fit: cover;
        border: 2px solid rgba(255, 179, 0, 0.5);
        flex-shrink: 0;
      }

      .review-item-name {
        color: #ffd54f;
        font-weight: 600;
        font-size: 15px;
      }

      .review-rating {
        color: #ffc107;
        letter-spacing: 2px;
        font-size: 18px;
        line-height: 1.4;
      }

      .review-rating span {
        color: #d0d0d0;
        font-size: 13px;
        letter-spacing: normal;
        margin-left: 6px;
      }

      .review-feedback {
        color: #f0f0f0;
        font-style: italic;
        line-height: 1.5;
        max-width: 320px;
      }

      .review-empty,
      .review-loading {
        text-align: center;
        color: #cccccc !important;
        padding: 30px !important;
        font-size: 15px;
      }

      .review-error {
        text-align: center;
        color: #ff6b6b !important;
        padding: 24px !important;
      }
    </style>
  </head>
  <body class="dashboard-body">
    <div class="sidebar">
      <div>
        <div class="sidebar-header">Admin Panel</div>

        <div class="sidebar-menu">
          <a href="/admin/dashboard"><i>📊</i> Dashboard</a>
          <a href="/admin/order_management"><i>📄</i> Order Management</a>
          <a href="/admin/menu_management"><i>🍴</i> Menu Management</a>
          <a href="/admin/user_management"><i>👥</i> User Management</a>
          <a href="/admin/admin_reviews" class="active"
            ><i>⭐</i> Customer Reviews</a
          >
          <a href="/admin/notifications"><i>🔔</i> Notifications</a>
          <a href="/admin/table_management"><i>🪑</i> Table Management</a>
        </div>
      </div>
      <a href="#" onclick="confirmLogout(event)" class="logout-btn">↪ Logout</a>
    </div>

    <div class="main-content reviews-page">
      <h2 class="page-title">Customer Reviews</h2>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Customer</th>
              <th>Item Ordered</th>
              <th>Rating</th>
              <th>Feedback</th>
            </tr>
          </thead>
          <tbody id="admin-reviews-body"></tbody>
        </table>
      </div>
    </div>

    <script>
      window.onload = loadReviews;

      async function loadReviews() {
        let tbody = document.getElementById("admin-reviews-body");
        tbody.innerHTML =
          "<tr><td colspan='5' class='review-loading'>Loading reviews...</td></tr>";

        try {
          const response = await fetch("/api/authority/reviews");
          const data = await response.json();

          tbody.innerHTML = "";

          if (!data.success || !data.reviews || data.reviews.length === 0) {
            tbody.innerHTML =
              "<tr><td colspan='5' class='review-empty'>No reviews yet.</td></tr>";
            return;
          }

          data.reviews.forEach((r) => {
            let stars = "★".repeat(r.rating || 0) + "☆".repeat(5 - (r.rating || 0));
            let date = r.created_at
              ? new Date(r.created_at).toLocaleDateString()
              : "-";

            let imgHtml = "";
            if (r.image_url) {
              let src = r.image_url;
              if (!src.startsWith("http")) src = "/static/images/" + src;
              imgHtml = `<img src="${src}" class="review-item-img" alt="" onerror="this.style.display='none'">`;
            }

            tbody.innerHTML += `
                <tr>
                    <td class="review-date">${date}</td>
                    <td class="review-customer">${r.full_name || "Guest"}</td>
                    <td>
                      <div class="review-item-cell">
                        ${imgHtml}
                        <span class="review-item-name">${r.item_name || "N/A"}</span>
                      </div>
                    </td>
                    <td class="review-rating">${stars}<span>(${r.rating || 0}/5)</span></td>
                    <td class="review-feedback">"${r.comment || "No comment"}"</td>
                </tr>
            `;
          });
        } catch (e) {
          console.error("Admin reviews load error:", e);
          tbody.innerHTML =
            "<tr><td colspan='5' class='review-error'>Error loading reviews. Make sure the server is running.</td></tr>";
        }
      }

      function confirmLogout(event) {
        event.preventDefault();
        if (confirm("Are you sure you want to Logout?")) {
          window.location.href = "/";
        }
      }
    </script>
  </body>
</html>
