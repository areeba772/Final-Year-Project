<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Smart Cafe</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      :root {
        --brand-yellow: #ffb300;
        --bg-burgundy-dark: #3b000d;
        --bg-overlay: rgba(59, 0, 13, 0.85);
        --glass-bg: rgba(255, 255, 255, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        /* Background image jo aapne di hai (Cafe View) */
        background: url("https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1920")
          no-repeat center center fixed;
        background-size: cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Full page maroon overlay */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-overlay);
        z-index: 1;
      }

      /* Split Card (Image left, Form right) */
      .login-card {
        position: relative;
        z-index: 2;
        display: flex;
        background: rgba(59, 0, 13, 0.6); /* Maroon glass effect */
        backdrop-filter: blur(15px);
        border-radius: 25px;
        overflow: hidden;
        width: 90%;
        max-width: 950px;
        height: 550px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Left Image Section (Noodles Image) */
      .login-image {
        flex: 1.1;
        background: url("/static/images/ad.jpeg"); /* Aapki noodles wali image */
        background-size: cover;
        background-position: center;
        display: block;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Right Form Section */
      .login-form-side {
        flex: 1;
        padding: 40px 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        color: white;
        position: relative;
      }

      .close-icon {
        position: absolute;
        top: 25px;
        right: 25px;
        text-decoration: none;
        color: white;
        font-size: 30px; /* Size bara kar diya */
        font-weight: 300;
        background: rgba(255, 255, 255, 0.1);
        width: 45px;
        height: 45px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
        transition: all 0.3s ease;
        z-index: 10;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      h2 {
        font-size: 2.2rem;
        margin-bottom: 8px;
        font-weight: 700;
      }
      .sub-text {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.85rem;
        margin-bottom: 35px;
      }

      .form-group {
        text-align: left;
        margin-bottom: 22px;
      }
      label {
        display: block;
        color: var(--brand-yellow);
        font-size: 0.85rem;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 14px;
        background: rgba(0, 0, 0, 0.4);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: white;
        outline: none;
        transition: 0.3s;
        font-size: 0.95rem;
      }

      input:focus {
        border-color: var(--brand-yellow);
        background: rgba(0, 0, 0, 0.6);
      }

      .btn-admin {
        width: 100%;
        padding: 14px;
        background: var(--brand-yellow);
        color: var(--bg-burgundy-dark);
        border: none;
        border-radius: 50px;
        font-weight: 700;
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 15px;
        box-shadow: 0 10px 20px rgba(255, 179, 0, 0.2);
      }

      .btn-admin:hover {
        background: white;
        transform: translateY(-3px);
      }

      .back-link {
        display: block;
        margin-top: 30px;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 0.85rem;
        transition: 0.3s;
      }

      .back-link:hover {
        color: white;
      }

      @media (max-width: 850px) {
        .login-image {
          display: none;
        }
        .login-card {
          max-width: 450px;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-image"></div>

      <div class="login-form-side">
        <a href="/" class="close-icon"><i class="fas fa-times"></i></a>

        <h2>Admin Portal</h2>
        <p class="sub-text">Authorized Personnel Only | Secure Access</p>

        <form onsubmit="adminLogin(event)">
          <div class="form-group">
            <label>Admin ID</label>
            <input
              type="text"
              id="admin-id"
              placeholder="Enter Admin ID"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="admin-pass"
              placeholder="Enter Secure Password"
              required
            />
          </div>

          <button type="submit" class="btn-admin">Login Now</button>
        </form>

        <a href="/" class="back-link">← Back to Main Page</a>
      </div>
    </div>

    <script>
      function adminLogin(event) {
        event.preventDefault(); // Stop refresh

        let id = document.getElementById("admin-id").value.trim();

        let pass = document.getElementById("admin-pass").value;

        // --- 1. VALIDATION (A-Z only) ---

        let nameRegex = /^[A-Za-z]+$/;

        if (!nameRegex.test(id)) {
          alert(
            "❌ Invalid Admin ID!\nOnly letters (A-Z) are allowed. No numbers or special characters.",
          );

          return;
        }

        // --- 2. PASSWORD CHECK ---

        let passRegex = /^\d+$/;
        if (!passRegex.test(pass)) {
          alert(
            "❌ Invalid Password! Password must contain digits (0-9) only.",
          );
          return;
        }

        if (pass.length < 6) {
          alert("❌ Password too short! Must be at least 6 digits.");

          return;
        }

        // --- 3. CREDENTIALS CHECK ---

        // Asal mein yeh Backend API se check hoga, abhi ke liye Hardcoded hai

        if (id.toLowerCase() === "admin" && pass === "123456") {
          // Success
          localStorage.setItem("adminUser", id);
          window.location.href = "/admin/dashboard";
        } else {
          alert("⛔ ACCESS DENIED!\nIncorrect Admin ID or Password.");
        }
      }
    </script>
  </body>
</html>
