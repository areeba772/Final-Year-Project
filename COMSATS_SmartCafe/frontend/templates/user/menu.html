{% extends "user/layout.html" %}

{% block title %}Menu - Smart Cafe{% endblock %}

{% block styles %}
<style>
      body {
        background: linear-gradient(135deg, #61001a 0%, #3b000d 45%, #2a0009 100%) !important;
        color: #f5f5f5 !important;
        min-height: 100vh;
      }

      .menu-page-wrap {
        max-width: 1320px;
        margin: 0 auto;
        padding: 30px 24px 50px;
      }

      .main-container {
        display: flex;
        gap: 28px;
        align-items: flex-start;
      }

      /* Sidebar */
      .menu-sidebar {
        flex: 0 0 260px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 179, 0, 0.2);
        border-radius: 18px;
        padding: 26px 18px;
        position: sticky;
        top: 95px;
        backdrop-filter: blur(8px);
      }

      .menu-sidebar h3 {
        color: #ffb300;
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        margin-bottom: 22px;
        text-transform: uppercase;
        border-bottom: 2px solid rgba(255, 179, 0, 0.35);
        padding-bottom: 12px;
      }

      .category-list {
        list-style: none;
      }

      .category-item {
        padding: 14px 16px;
        margin-bottom: 8px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #e8e8e8;
        font-weight: 600;
        font-size: 15px;
        border: 1px solid transparent;
      }

      .category-item:hover {
        background: rgba(255, 179, 0, 0.12);
        color: #fff;
      }

      .category-item.active {
        background: linear-gradient(90deg, #ff8f00, #ffb300, #ffc107);
        color: #3b000d;
        font-weight: 800;
        box-shadow: 0 6px 20px rgba(255, 143, 0, 0.35);
        border-color: transparent;
      }

      .category-item.active .cat-icon {
        color: #3b000d;
      }

      .cat-icon {
        font-size: 17px;
        width: 22px;
        text-align: center;
        color: #ffb300;
      }

      /* Main */
      .menu-content {
        flex: 1;
        min-width: 0;
      }

      .search-bar {
        width: 100%;
        padding: 16px 24px;
        border-radius: 50px;
        border: 1px solid rgba(255, 179, 0, 0.25);
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        margin-bottom: 28px;
        font-size: 16px;
        outline: none;
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .search-bar::placeholder {
        color: rgba(255, 255, 255, 0.55);
      }

      .search-bar:focus {
        border-color: #ffb300;
        box-shadow: 0 0 0 3px rgba(255, 179, 0, 0.2);
      }

      .food-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 24px;
      }

      .grid-msg {
        grid-column: 1 / -1;
        text-align: center;
        color: #ddd;
        padding: 40px;
        font-size: 16px;
      }

      /* Card - screenshot style */
      .food-card {
        background: rgba(20, 20, 20, 0.75);
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 179, 0, 0.15);
        transition: transform 0.3s, box-shadow 0.3s;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .food-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 14px 35px rgba(0, 0, 0, 0.45);
        border-color: rgba(255, 179, 0, 0.4);
      }

      .food-card-img-wrap {
        height: 170px;
        width: 100%;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        background: #1a1a1a;
      }

      .food-card-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.45s ease;
      }

      .food-card:hover .food-card-img-wrap img {
        transform: scale(1.06);
      }

      .card-cal-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(59, 0, 13, 0.92);
        color: #ffb300;
        padding: 5px 11px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 800;
        border: 1px solid rgba(255, 179, 0, 0.4);
      }

      .food-card-body {
        padding: 18px 16px 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
      }

      .card-title {
        font-weight: 800;
        color: #ffffff;
        margin: 0 0 8px;
        font-size: 1.15rem;
        cursor: pointer;
        line-height: 1.3;
      }

      .card-title:hover {
        color: #ffb300;
      }

      .card-rating {
        color: #ffc107;
        font-size: 14px;
        margin-bottom: 6px;
        letter-spacing: 1px;
      }

      .card-reviews {
        color: rgba(255, 255, 255, 0.65);
        font-size: 12px;
        margin-left: 4px;
      }

      .card-category {
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        margin-bottom: 8px;
        text-transform: capitalize;
      }

      .card-cal-row {
        color: #ffb300;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .card-price {
        font-size: 1.35rem;
        font-weight: 800;
        color: #ffb300;
        margin-bottom: 14px;
      }

      .size-dropdown {
        width: 100%;
        padding: 9px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 179, 0, 0.3);
        background: rgba(0, 0, 0, 0.4);
        color: #fff;
        margin-bottom: 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        outline: none;
      }

      .size-dropdown option {
        background: #3b000d;
        color: #fff;
      }

      .btn-order-now {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        color: #3b000d;
        background: linear-gradient(90deg, #ff8f00, #ffb300, #ffc107);
        box-shadow: 0 6px 18px rgba(255, 143, 0, 0.35);
        transition: transform 0.2s, box-shadow 0.2s;
        margin-top: auto;
      }

      .btn-order-now:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(255, 179, 0, 0.5);
      }

      @media (max-width: 900px) {
        .main-container {
          flex-direction: column;
        }
        .menu-sidebar {
          position: static;
          flex: none;
          width: 100%;
        }
        .category-list {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
        }
        .category-item {
          margin-bottom: 0;
          flex: 1 1 auto;
          min-width: 130px;
          justify-content: center;
        }
      }
</style>
{% endblock %}

{% block content %}
    <div class="menu-page-wrap">
      <div class="main-container">
        <aside class="menu-sidebar">
          <h3>Categories</h3>
          <ul class="category-list">
            <li class="category-item active" onclick="filterCategory('All', this)">
              <i class="fas fa-th-large cat-icon"></i> All
            </li>
            <li class="category-item" onclick="filterCategory('Fast Food', this)">
              <i class="fas fa-hamburger cat-icon"></i> Fast Food
            </li>
            <li class="category-item" onclick="filterCategory('Desi Food', this)">
              <i class="fas fa-pepper-hot cat-icon"></i> Desi Food
            </li>
            <li class="category-item" onclick="filterCategory('Drinks', this)">
              <i class="fas fa-cocktail cat-icon"></i> Drinks
            </li>
            <li class="category-item" onclick="filterCategory('Dessert', this)">
              <i class="fas fa-ice-cream cat-icon"></i> Sweets
            </li>
          </ul>
        </aside>

        <section class="menu-content">
          <input
            type="text"
            id="search-input"
            class="search-bar"
            placeholder="🔍 Search for your favorite food..."
            onkeyup="filterMenu()"
          />

          <div class="food-grid" id="menu-grid">
            <p class="grid-msg">Loading Menu...</p>
          </div>
        </section>
      </div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
      let fullMenu = [];
      let currentCategory = "All";

      window.addEventListener("load", fetchMenu);

      async function fetchMenu() {
        const grid = document.getElementById("menu-grid");
        grid.innerHTML = '<p class="grid-msg">Loading Menu...</p>';

        try {
          const response = await fetch("/api/menu");
          const data = await response.json();

          if (data.success && data.menu.length > 0) {
            fullMenu = data.menu;
            renderMenu(fullMenu);
          } else {
            grid.innerHTML = '<p class="grid-msg">No menu items found.</p>';
          }
        } catch (error) {
          console.error("Menu Error:", error);
          grid.innerHTML = '<p class="grid-msg" style="color:#ff8a80;">Server unreachable.</p>';
        }
      }

      function renderMenu(items) {
        const grid = document.getElementById("menu-grid");
        grid.innerHTML = "";

        if (items.length === 0) {
          grid.innerHTML = '<p class="grid-msg">No items match your search.</p>';
          return;
        }

        items.forEach((item) => {
          const linkUrl = `/user/food_detail?name=${encodeURIComponent(item.name)}`;
          let imgSrc = item.image_url;
          if (!imgSrc || !imgSrc.startsWith("http")) {
            imgSrc = imgSrc ? `/static/images/${imgSrc}` : "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500";
          }

          const uniqueId = "menu_card_" + item.item_id;
          let initialPrice = item.price || 0;
          let initialCals = item.calories || "---";
          let initialVarId = null;
          let defaultVarName = "";

          let varsDropdown = "";
          if (item.variations && item.variations.length > 0) {
            const options = item.variations
              .map((v, idx) => {
                if (idx === 0) {
                  initialPrice = v.price;
                  initialCals = v.calories;
                  initialVarId = v.variation_id;
                  defaultVarName = v.variation_name;
                }
                return `<option value="${v.variation_id}" data-price="${v.price}" data-calories="${v.calories}" data-vname="${v.variation_name}">${v.variation_name}</option>`;
              })
              .join("");
            varsDropdown = `<select class="size-dropdown" onchange="updateCardUI(this, '${uniqueId}')">${options}</select>`;
          }

          const rating = item.rating || 0;
          let stars = "";
          for (let i = 1; i <= 5; i++) stars += i <= Math.round(rating) ? "★" : "☆";

          const safeName = item.name.replace(/'/g, "\\'");
          const hasVars = item.variations && item.variations.length > 0;

          grid.innerHTML += `
            <div class="food-card" id="${uniqueId}">
              <div class="food-card-img-wrap" onclick="window.location.href='${linkUrl}'">
                <img src="${imgSrc}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500'">
                <span class="card-cal-badge">🔥 <span class="card-calories">${initialCals}</span> Cal</span>
              </div>
              <div class="food-card-body">
                <h4 class="card-title" onclick="window.location.href='${linkUrl}'">${item.name}</h4>
                <div class="card-rating">${stars}<span class="card-reviews">(${item.review_count || 0} reviews)</span></div>
                <div class="card-category">${item.category || "Food"}</div>
                <div class="card-cal-row">Energy: <span class="card-calories-text">${initialCals}</span> kcal</div>
                <div class="card-price">Rs. <span class="card-price-val">${initialPrice}</span></div>
                ${varsDropdown}
                <button type="button" class="btn-order-now" onclick="addFromDropdown('${uniqueId}', '${item.item_id}', '${safeName}', ${hasVars})">Order Now</button>
                <input type="hidden" class="hidden-vid" value="${initialVarId || ""}">
                <input type="hidden" class="hidden-vname" value="${defaultVarName}">
                <input type="hidden" class="hidden-price" value="${initialPrice}">
              </div>
            </div>`;
        });
      }

      function filterCategory(category, element) {
        document.querySelectorAll(".category-item").forEach((i) => i.classList.remove("active"));
        element.classList.add("active");
        currentCategory = category;
        applyFilters();
      }

      function filterMenu() {
        applyFilters();
      }

      function applyFilters() {
        const input = document.getElementById("search-input").value.toUpperCase();
        const filtered = fullMenu.filter((i) => {
          if (currentCategory === "All") {
            return i.name.toUpperCase().includes(input);
          }
          
          if (!i.category) return false;
          
          const itemCat = i.category.toLowerCase().trim();
          const curCat = currentCategory.toLowerCase().trim();
          
          // Case insensitive comparison
          let matchCat = (itemCat === curCat);
          
          // Handle common spelling/phrasing variations
          if (!matchCat) {
            const isDesi = (c) => c.includes("desi");
            const isFast = (c) => c.includes("fast") || c.includes("burger") || c.includes("pizza");
            const isDrink = (c) => c.includes("drink") || c.includes("beverage");
            const isDessert = (c) => c.includes("dessert") || c.includes("sweet");
            
            if (isDesi(curCat) && isDesi(itemCat)) matchCat = true;
            else if (isFast(curCat) && isFast(itemCat)) matchCat = true;
            else if (isDrink(curCat) && isDrink(itemCat)) matchCat = true;
            else if (isDessert(curCat) && isDessert(itemCat)) matchCat = true;
            else matchCat = itemCat.includes(curCat) || curCat.includes(itemCat);
          }
          
          const matchSearch = i.name.toUpperCase().includes(input);
          return matchCat && matchSearch;
        });
        renderMenu(filtered);
      }

      function updateCardUI(selectElem, cardId) {
        const card = document.getElementById(cardId);
        if (!card) return;
        const opt = selectElem.options[selectElem.selectedIndex];
        const price = opt.getAttribute("data-price");
        const cals = opt.getAttribute("data-calories");
        card.querySelector(".card-price-val").textContent = price;
        card.querySelectorAll(".card-calories").forEach((el) => (el.textContent = cals));
        const calText = card.querySelector(".card-calories-text");
        if (calText) calText.textContent = cals;
        card.querySelector(".hidden-price").value = price;
        card.querySelector(".hidden-vid").value = opt.value;
        card.querySelector(".hidden-vname").value = opt.getAttribute("data-vname");
      }

      function addFromDropdown(cardId, itemId, itemName, hasVars) {
        const card = document.getElementById(cardId);
        const price = parseFloat(card.querySelector(".hidden-price").value) || 0;
        let varId = null;
        let varName = "";
        if (hasVars) {
          varId = card.querySelector(".hidden-vid").value;
          varName = card.querySelector(".hidden-vname").value;
        }
        let cart = JSON.parse(localStorage.getItem("mySmartCart")) || [];
        const found = cart.find((i) => i.item_id == itemId && i.variation_id == varId);
        const cartName = varName ? `${itemName} (${varName})` : itemName;
        if (found) found.qty++;
        else cart.push({ item_id: itemId, variation_id: varId, name: cartName, price: price, qty: 1 });
        localStorage.setItem("mySmartCart", JSON.stringify(cart));
        alert(cartName + " added to cart!");
        if (typeof updateCartCount === "function") updateCartCount();
      }
    </script>
{% endblock %}
