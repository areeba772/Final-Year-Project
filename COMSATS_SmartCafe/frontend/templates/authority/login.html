<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Authority Login | Smart Cafe</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      :root {
        --brand-yellow: #ffb300;
        --bg-burgundy-dark: #3b000d;
        --bg-overlay: rgba(59, 0, 13, 0.85);
        --glass-bg: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: url("/static/images/fbg.jpg") no-repeat center center fixed;
        background-size: cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-overlay);
        z-index: 1;
      }

      .login-card {
        position: relative;
        z-index: 2;
        display: flex;
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        overflow: hidden;
        width: 90%;
        max-width: 900px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .login-image {
        flex: 1;
        background: url("/static/images/foodtests.jpg");
        background-size: cover;
        background-position: center;
        display: block;
        filter: brightness(0.8) contrast(1.2);
      }

      .login-form {
        position: relative;
        flex: 1;
        padding: 50px;
        background: rgba(59, 0, 13, 0.5);
        text-align: center;
        color: white;
      }

      /* Corner Cross Button */
      .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 28px;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        transition: 0.3s;
        line-height: 1;
      }

      .close-btn:hover {
        color: var(--brand-yellow);
        transform: scale(1.2);
      }

      .icon-box {
        font-size: 3rem;
        color: var(--brand-yellow);
        margin-bottom: 15px;
      }

      h2 {
        font-size: 2rem;
        margin-bottom: 5px;
        font-weight: 700;
      }

      .subtitle {
        color: #ccc;
        font-size: 0.85rem;
        margin-bottom: 30px;
      }

      .input-group {
        text-align: left;
        margin-bottom: 20px;
      }

      label {
        display: block;
        color: var(--brand-yellow);
        font-size: 0.8rem;
        margin-bottom: 5px;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 12px;
        background: rgba(0, 0, 0, 0.4);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: white;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        border-color: var(--brand-yellow);
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        background: var(--brand-yellow);
        color: var(--bg-burgundy-dark);
        border: none;
        border-radius: 50px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }

      .login-btn:hover {
        background: white;
        transform: translateY(-2px);
      }

      .back-link {
        display: block;
        margin-top: 25px;
        color: #aaa;
        text-decoration: none;
        font-size: 0.8rem;
      }

      .back-link:hover {
        color: white;
      }

      @media (max-width: 768px) {
        .login-image {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-image"></div>

      <div class="login-form">
        <a href="/" class="close-btn">&times;</a>

        <div class="icon-box">
          <i class="fas fa-shield-alt"></i>
        </div>

        <h2>Food Authority</h2>
        <p class="subtitle">Enter your credentials to access the portal.</p>

        <form onsubmit="authLogin(event)">
          <div class="input-group">
            <label>Officer Email</label>
            <input
              type="email"
              id="auth-email"
              placeholder="authority@cafe.com"
              value="authority@cafe.com"
              required
            />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input
              type="password"
              id="auth-pass"
              placeholder="authority123"
              value="authority123"
              required
            />
          </div>

          <button type="submit" class="login-btn">Login Now</button>
        </form>

        <a href="/" class="back-link">← Back to Main Page</a>
      </div>
    </div>

    <script>
      async function authLogin(event) {
        event.preventDefault();
        let email = document.getElementById("auth-email").value.trim();
        let pass = document.getElementById("auth-pass").value;

        try {
          const response = await fetch("/api/authority/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: email, password: pass }),
            },
          );

          const data = await response.json();
          if (data.success) {
            localStorage.setItem("authorityUser", email);
            localStorage.setItem("authorityName", data.name);
            alert("✅ Welcome, " + data.name + "!");
            window.location.href = "/authority/dashboard";
          } else {
            alert("⛔ " + (data.message || "Access Denied!"));
          }
        } catch (error) {
          alert("❌ Connection failed. Ensure Flask is running.");
        }
      }
    </script>
  </body>
</html>
